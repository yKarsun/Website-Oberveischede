<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanierung Flutlicht – OV Sport</title>
    <link rel="stylesheet" type="text/css" href="../Css/style.css">
    <link rel="icon" href="../Pictures/Logo_spvg_365x365.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .news-box img { width: 100%; max-width: 1200px; height: auto; cursor: pointer; transition: transform 0.3s ease; }
        .news-box img:hover { transform: scale(1.03); }
        .lightbox {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center; align-items: center; z-index: 1000;
        }
        .lightbox img { width: 80%; max-width: 1200px; height: auto; max-height: 90%; }
        .lightbox:target { display: flex; }
        .lightbox .close { position: absolute; top: 20px; right: 20px; color: white; font-size: 30px; text-decoration: none; }
        @media (max-width: 768px) { .news-box { width: 90%; } .lightbox img { width: 90%; } }
    </style>
</head>
<body>
    <div class="wrapper">
        <div id="header"></div>
        <script>
            fetch('../header.html')
                .then(response => response.text())
                .then(data => document.getElementById('header').innerHTML = data);
        </script>

        <div class="news-box">
            <a href="#lightbox1">
                <img src="../Pictures/KW 06 Flutlicht ZUG png.png" alt="Flutlicht Bild">
            </a>
        </div>

        <div id="lightbox1" class="lightbox">
            <a href="#" class="close">&times;</a>
            <img src="../Pictures/KW 06 Flutlicht ZUG png.png" alt="Flutlicht Großansicht">
        </div>

        <footer>
            <div class="footer">
                <a href="../Rest/impressum.html"><b>Impressum</b></a><br>
                <a href="../Rest/Kontakt.html"><b>Kontakt</b></a>
            </div>
        </footer>
    </div>
</body>
</html>
