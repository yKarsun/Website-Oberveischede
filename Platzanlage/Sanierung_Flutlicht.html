<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OV Sport</title>
    <link rel="stylesheet" type="text/css" href="/Css/style.css">
    <link rel="icon" href="/Pictures/Logo_spvg_365x365.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Calibri:wght@400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            font-family: 'Calibri', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .news-box {
            width: 70%;
            margin: 20px auto;
            background-color: rgb(25, 26, 28);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .news-box img {
            width: 100%;
            max-width: 1200px;
            height: auto;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .news-box img:hover {
            transform: scale(1.03);
        }
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .lightbox img {
            width: 80%;
            max-width: 1200px;
            height: auto;
            max-height: 90%;
        }
        .lightbox:target {
            display: flex;
        }
        .lightbox .close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            text-decoration: none;
        }
        @media (max-width: 768px) {
            .news-box {
                width: 90%;
                font-size: 1.2em;
            }
            .lightbox img {
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <div id="header"></div>
            <script>
                fetch('/header.html')
                    .then(response => response.text())
                    .then(data => document.getElementById('header').innerHTML = data);
            </script>
        </header>

        <div class="news-box">
            <a href="#lightbox1">
                <img src="/Pictures/KW 06 Flutlicht ZUG png.png" alt="Flutlicht Bild">
            </a>
        </div>

        <div id="lightbox1" class="lightbox">
            <a href="#" class="close">&times;</a>
            <img src="/Pictures/KW 06 Flutlicht ZUG png.png" alt="Flutlicht Bild Großansicht">
        </div>
    </div>
</body>
</html>
