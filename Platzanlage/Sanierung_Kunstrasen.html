<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanierung Kunstrasen – OV Sport</title>
    <link rel="stylesheet" type="text/css" href="../Css/style.css">
    <link rel="icon" href="../Pictures/Logo_spvg_365x365.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .news-box img {
            width: 100%;
            max-width: 1200px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .news-box img:hover { transform: scale(1.05); }
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .lightbox img { width: 90%; height: auto; max-width: 1200px; max-height: 90%; }
        .lightbox:target { display: flex; }
        .lightbox .close { position: absolute; top: 20px; right: 20px; color: white; font-size: 30px; text-decoration: none; }
        .extra-images { display: none; }
        @media (max-width: 768px) {
            .main-image { display: none; }
            .extra-images { display: block; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div id="header"></div>
        <script>
            fetch('../header.html')
                .then(response => response.text())
                .then(data => document.getElementById('header').innerHTML = data);
        </script>

        <div class="news-box">
            <h1>Flyer Kunstrasenplatz</h1><br><br>
            <a href="#lightbox1">
                <img class="main-image" src="../Pictures/Flyer_Kunstrasenplatz_1124.pdf[1].png" alt="Flyer Kunstrasenplatz">
            </a>
            <div class="extra-images">
                <a href="#lightbox2"><img src="../Pictures/Flyer_Kunstrasenplatz1.pdf[1].png" alt="Flyer Kunstrasenplatz 1"></a>
                <a href="#lightbox3"><img src="../Pictures/Flyer_Kunstrasenplatz_2.pdf[1].png" alt="Flyer Kunstrasenplatz 2"></a>
            </div>
            <a href="https://www.betterplace.org/de/organisations/42162-spvg-blau-weiss-oberveischede-e-v" target="_blank" class="donate-button">Spenden auf Betterplace</a>
        </div>

        <div id="lightbox1" class="lightbox">
            <a href="#" class="close">&times;</a>
            <img src="../Pictures/Flyer_Kunstrasenplatz_1124.pdf[1].png" alt="Flyer Großansicht">
        </div>
        <div id="lightbox2" class="lightbox">
            <a href="#" class="close">&times;</a>
            <img src="../Pictures/Flyer_Kunstrasenplatz1.pdf[1].png" alt="Flyer 1 Großansicht">
        </div>
        <div id="lightbox3" class="lightbox">
            <a href="#" class="close">&times;</a>
            <img src="../Pictures/Flyer_Kunstrasenplatz_2.pdf[1].png" alt="Flyer 2 Großansicht">
        </div>

        <footer>
            <div class="footer">
                <a href="../Rest/impressum.html"><b>Impressum</b></a><br>
                <a href="../Rest/Kontakt.html"><b>Kontakt</b></a>
            </div>
        </footer>
    </div>
</body>
</html>
