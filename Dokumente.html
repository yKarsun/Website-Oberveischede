<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OV Sport</title>
    <link rel="stylesheet" type="text/css" href="/Css/style.css">
    <link rel="icon" href="/Pictures/Logo_spvg_365x365.png" type="imgage/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Calibri:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        /* Grundlegende Styles für die Seite */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Wrapper um alle Inhalte */
        .wrapper {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* Media Query für kleinere Bildschirme */
        @media screen and (max-width: 1366px) {
            .news-box img {
                width: 100%;
                max-width: 600px;
            }

            .news-box {
                width: 70%;
                margin: 20px auto;
                background-color: rgb(25, 26, 28);
                color: white;
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
                display: flex;
                flex-direction: column;
                align-items: center;
            }
        }

        /* Footer */
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- Header wird hier geladen -->
        <header>
            <div id="header"></div>
            <script>
                fetch('/header.html')
                    .then(response => response.text())
                    .then(data => document.getElementById('header').innerHTML = data);
            </script>
        </header>

        <!-- Hauptinhalt -->
        <div class="news-box">
            <h1>Beitrittserklärung</h1><br>
            <img src="/Pictures/Beitrittserklaerung NEU 2024-2.png" width="50%"><br>
            <a href="/Pictures/Beitrittserklaerung NEU 2024-2.pdf" class="download-button" download>Download</a>
        </div>

        <!-- Footer -->
        <footer>
            <div class="footer">
                <a href="/Rest/impressum.html"><b>Impressum</b></a><br>
                <a href="/Rest/Kontakt.html"><b>Kontakt</b></a>
            </div>
        </footer>
    </div>

</body>
</html>
